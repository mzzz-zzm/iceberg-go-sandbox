services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    volumes:
      - .:/workspace
      - go_cache:/go/pkg/mod
    environment:
      - GO111MODULE=on
      - AWS_REGION=ap-southeast-4
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_ENDPOINT=http://minio:9000
      - ICEBERG_REST_URI=http://catalog:8181
    working_dir: /workspace
    depends_on:
      - catalog
    command: ["/bin/sh", "run.sh"]
  
  catalog:
    image: tabulario/iceberg-rest:latest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_ACCESS_KEY_ID=minioadmin
      - CATALOG_S3_SECRET_ACCESS_KEY=minioadmin
      - CATALOG_S3_PATH_STYLE_ACCESS=true
      - CATALOG_S3_REGION=ap-southeast-4
      - CATALOG_CLIENT_REGION=ap-southeast-4
      - AWS_REGION=ap-southeast-4
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      - minio

  # fake s3: source for Json access logs
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
    networks:
      default:
        aliases:
          - warehouse.minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: minio
    command: server /data

volumes:
  go_cache: